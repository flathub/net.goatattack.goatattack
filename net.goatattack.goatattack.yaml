app-id: net.goatattack.goatattack
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: goatattack
rename-icon: goatattack
rename-desktop-file: goatattack.desktop
rename-appdata-file: goatattack.appdata.xml
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --share=network
  - --persist=.goatattack

modules:
  - name: goatattack
    buildsystem: autotools
    build-options:
      cxxflags: -std=c++14
    sources:
      - type: git
        url: https://github.com/goatattack/goatattack.git
        tag: '0.5.0'
      - type: patch
        path: fix-appdata.patch
      - type: shell
        commands:
          - autoreconf -vfi;
